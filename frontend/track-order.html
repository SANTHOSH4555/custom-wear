<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Order | CUSTOM WEAR & CRADANCE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              blue: '#facc15',
              darkblue: '#eab308'
            },
            blue: {
              50: '#fefce8', 100: '#fef9c3', 200: '#fef08a', 300: '#fde047',
              400: '#facc15', 500: '#eab308', 600: '#ca8a04', 700: '#a16207',
              800: '#854d0e', 900: '#713f12', 950: '#422006'
            },
            indigo: {
              50: '#fefce8', 100: '#fef9c3', 200: '#fef08a', 300: '#fde047',
              400: '#facc15', 500: '#eab308', 600: '#ca8a04', 700: '#a16207',
              800: '#854d0e', 900: '#713f12', 950: '#422006'
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen pt-20">

  <!-- Navbar -->
  <nav class="glass-nav fixed top-0 left-0 w-full z-50 transition duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-20">
        <a href="index.html" class="flex items-center gap-3">
          <img src="assets/images/brand_logo.jpeg" alt="Logo" class="h-10 w-10 rounded-full border border-yellow-500">
          <span class="font-extrabold text-xl tracking-wider text-yellow-500">CW & CRADANCE</span>
        </a>
        <div class="hidden md:flex items-center space-x-6 text-sm font-medium">
          <a href="index.html" class="hover:text-yellow-400 transition">Home</a>
          <a href="custom-wear.html" class="hover:text-yellow-400 transition">CUSTOM WEAR</a>
          <a href="cradance.html" class="hover:text-yellow-400 transition">CRADANCE</a>
          <a href="custom-printing.html" class="hover:text-yellow-400 transition">Custom Printing</a>
          <a href="products.html" class="hover:text-yellow-400 transition">Shop All</a>
        </div>
        <div class="flex items-center space-x-4">
          <a href="cart.html" class="p-2 rounded-full hover:bg-gray-800 text-gray-400 hover:text-white transition relative">
            <i data-lucide="shopping-bag" class="w-5 h-5"></i>
            <span class="cart-count-badge absolute -top-1 -right-1 bg-yellow-600 text-white rounded-full text-[10px] w-4 h-4 flex items-center justify-center font-bold hidden">0</span>
          </a>
          <a href="dashboard.html" class="p-2 rounded-full hover:bg-gray-800 text-gray-400 hover:text-white transition"><i data-lucide="user" class="w-5 h-5"></i></a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Track Container -->
  <main class="max-w-3xl mx-auto px-4 py-16">
    <div class="text-center mb-12" data-aos="fade-up">
      <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight">Track Your Order</h1>
      <p class="text-gray-400 mt-2">Enter details below to trace your dispatch status in real-time.</p>
    </div>

    <!-- Tracking Form -->
    <div class="glass-card p-6 sm:p-8 rounded-3xl border border-gray-800 mb-8" data-aos="fade-up" data-aos-delay="100">
      <form onsubmit="handleTrack(event)" class="flex flex-col gap-6">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="flex flex-col">
            <label class="text-[10px] text-gray-500 uppercase font-black tracking-widest mb-1.5">Order ID Reference</label>
            <input type="text" id="track-order-id" placeholder="ORD-XXXXX" class="glass-input px-4 py-3 rounded-xl text-xs focus:outline-none" required>
          </div>
          <div class="flex flex-col">
            <label class="text-[10px] text-gray-500 uppercase font-black tracking-widest mb-1.5">Email OR Phone Number</label>
            <input type="text" id="track-contact" placeholder="Customer email or mobile number" class="glass-input px-4 py-3 rounded-xl text-xs focus:outline-none" required>
          </div>
        </div>
        <button type="submit" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-4 rounded-xl shadow-lg transition flex items-center justify-center gap-2 text-sm">
          <i data-lucide="search" class="w-5 h-5"></i> Check Status
        </button>
      </form>
    </div>

    <!-- Tracking Output (Hidden initially) -->
    <div id="tracking-result" class="glass-card p-6 sm:p-8 rounded-3xl border border-gray-800 hidden" data-aos="fade-up">
      <!-- Status Progress -->
      <div class="py-4 border-b border-gray-800/40 mb-6">
        <label class="text-[9px] text-gray-500 font-black tracking-widest uppercase block mb-6">Dispatch Status Tracker</label>
        <div class="flex items-center justify-between relative" id="status-nodes-container">
          <!-- Populated dynamically -->
        </div>
      </div>

      <!-- Order Details -->
      <div class="flex flex-col gap-4 text-xs">
        <div class="flex justify-between border-b border-gray-800/20 pb-2">
          <span class="text-gray-500">Order Reference</span>
          <span id="res-order-id" class="font-extrabold text-yellow-500 uppercase">ORD-XYZ</span>
        </div>
        <div class="flex justify-between border-b border-gray-800/20 pb-2">
          <span class="text-gray-500">Customer Name</span>
          <span id="res-name" class="font-bold text-white"></span>
        </div>
        <div class="flex justify-between border-b border-gray-800/20 pb-2">
          <span class="text-gray-500">Shipping Destination</span>
          <span id="res-destination" class="text-white text-right"></span>
        </div>
        <div class="flex justify-between border-b border-gray-800/20 pb-2">
          <span class="text-gray-500">Expected Delivery</span>
          <span class="font-semibold text-white">3 to 5 Business Days</span>
        </div>
        
        <div class="flex flex-col gap-2 mt-4">
          <span class="text-[10px] text-gray-500 uppercase font-black tracking-widest">Ordered Items</span>
          <div id="res-items" class="flex flex-col gap-2 bg-gray-950/40 p-4 rounded-xl border border-gray-900/60">
            <!-- Items injected here -->
          </div>
        </div>

        <div class="flex justify-between items-center mt-4 pt-4 border-t border-gray-800/40">
          <span class="text-gray-500">Payment Status: <span id="res-payment-status" class="font-extrabold text-green-400">Paid</span></span>
          <span id="res-total" class="text-base font-black text-yellow-500">Rs. 0</span>
        </div>
      </div>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script>
    AOS.init({ duration: 800, once: true });
    
    // Parse order parameters if navigated directly from checkout or email links
    document.addEventListener("DOMContentLoaded", () => {
      const urlParams = new URLSearchParams(window.location.search);
      const orderId = urlParams.get("id");
      const contact = urlParams.get("contact");
      if (orderId && contact) {
        document.getElementById("track-order-id").value = orderId;
        document.getElementById("track-contact").value = contact;
        fetchTracking(orderId, contact);
      }
    });

    async function handleTrack(e) {
      e.preventDefault();
      const orderId = document.getElementById("track-order-id").value.trim();
      const contact = document.getElementById("track-contact").value.trim();
      
      await fetchTracking(orderId, contact);
    }

    async function fetchTracking(orderId, contact) {
      const resultDiv = document.getElementById("tracking-result");
      resultDiv.classList.add("hidden");
      
      let queryParam = "";
      if (contact.includes("@")) {
        queryParam = `email=${encodeURIComponent(contact)}`;
      } else {
        queryParam = `phone=${encodeURIComponent(contact)}`;
      }

      try {
        const order = await apiRequest(`/orders/track/${orderId}?${queryParam}`);
        
        // Populate result details
        document.getElementById("res-order-id").textContent = order.id;
        document.getElementById("res-name").textContent = order.shipping_address.name;
        document.getElementById("res-destination").textContent = `${order.shipping_address.city}, ${order.shipping_address.state}`;
        document.getElementById("res-payment-status").textContent = order.payment_status;
        document.getElementById("res-payment-status").className = `font-extrabold ${order.payment_status === 'Paid' ? 'text-green-400' : 'text-yellow-500'}`;
        document.getElementById("res-total").textContent = `Rs. ${order.pricing.grand_total.toFixed(2)}`;

        // Populate Items list
        const itemsContainer = document.getElementById("res-items");
        itemsContainer.innerHTML = order.items.map(item => `
          <div class="flex justify-between items-center text-xs">
            <div>
              <span class="font-bold text-white">${item.name}</span>
              <p class="text-[10px] text-gray-500 mt-0.5">Size: ${item.size} | Color: ${item.color} ${item.customization ? `| Custom Design` : ''}</p>
            </div>
            <span class="font-semibold text-gray-400">x${item.quantity}</span>
          </div>
        `).join('');

        // Progress indicators
        const statuses = ["Ordered", "Packed", "Shipped", "Out for Delivery", "Delivered"];
        const curIdx = statuses.indexOf(order.status);
        const nodesContainer = document.getElementById("status-nodes-container");
        
        let trackNodes = "";
        statuses.forEach((s, idx) => {
          const isActive = idx <= curIdx;
          trackNodes += `
            <div class="flex flex-col items-center relative flex-1">
              <div class="h-6 w-6 rounded-full border-2 border-gray-800 bg-gray-950 text-[10px] font-bold flex items-center justify-center z-10 transition ${
                isActive ? 'border-yellow-500 text-yellow-500 bg-yellow-500/10' : ''
              }">
                ${idx + 1}
              </div>
              <span class="text-[8px] text-gray-500 mt-2 font-bold uppercase ${isActive ? 'text-yellow-500' : ''}">${s}</span>
              ${idx < 4 ? `
                <div class="absolute top-3 left-[50%] right-[-50%] h-[2px] bg-gray-800 z-0 transition ${
                  idx < curIdx ? 'bg-yellow-500' : ''
                }"></div>
              ` : ''}
            </div>
          `;
        });
        nodesContainer.innerHTML = trackNodes;

        resultDiv.classList.remove("hidden");
        resultDiv.scrollIntoView({ behavior: 'smooth' });
      } catch (err) {
        showToast(err.message, "error");
      }
    }
  </script>
</body>
</html>
